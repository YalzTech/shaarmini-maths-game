<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maths Millionaire Quiz Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-wrapper">
    <section id="start-screen" class="screen active">
      <div class="card intro-card">
        <h1>Maths Millionaire Quiz Game</h1>
        <p>Year 1 & Year 2 Mathematics Quiz based on Malaysian primary school level.</p>
        <input id="player-name" type="text" placeholder="Enter student name" />
        <button onclick="startGame()">Start Game</button>
      </div>
    </section>

    <section id="game-screen" class="screen">
      <div class="top-bar">
        <div>
          <p class="small-label">Student</p>
          <h2 id="player-display">Student</h2>
        </div>
        <div>
          <p class="small-label">Current Level</p>
          <h2 id="level-display">1 / 15</h2>
        </div>
      </div>

      <div class="content-grid">
        <div class="quiz-card">
          <p id="prize-display" class="prize-text">10 points</p>
          <h1 id="question-text">Question will appear here</h1>
          <div id="answers" class="answers-grid"></div>

          <div class="game-actions">
            <button id="hint-btn" onclick="showHint()">AI Hint</button>
            <button onclick="quitGame()" class="secondary-btn">End Game</button>
          </div>
        </div>

        <aside class="ladder-card">
          <h3>Score Ladder</h3>
          <ol id="prize-ladder" class="prize-ladder"></ol>
        </aside>
      </div>
    </section>

    <section id="end-screen" class="screen">
      <div class="card intro-card">
        <h1 id="end-title">Game Over</h1>
        <p id="end-message">Your result will appear here.</p>
        <button onclick="restartGame()">Play Again</button>
      </div>
    </section>
  </main>

  <div id="popup" class="popup hidden">
    <div class="popup-box">
      <h2 id="popup-title">Title</h2>
      <p id="popup-message">Message</p>
      <button id="popup-button">Continue</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
